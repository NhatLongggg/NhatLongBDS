name: Build and Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
  runs-on: windows-latest
  needs: build

  steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: .net-app

    - name: Deploy using MSDeploy
      shell: powershell
      run: |
        choco install webdeploy -y

        & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
          -verb:sync `
          -source:contentPath="${{ github.workspace }}" `
          -dest:contentPath="${{ secrets.WEBDEPLOY_SITE }}",computerName="https://${{ secrets.WEBDEPLOY_SERVER }}:8172/msdeploy.axd?site=${{ secrets.WEBDEPLOY_SITE }}",userName="${{ secrets.WEBDEPLOY_USERNAME }}",password="${{ secrets.WEBDEPLOY_PASSWORD }}",authType="Basic" `
          -allowUntrusted
